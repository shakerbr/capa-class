<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 95vh; flex-direction: column;">
    <header style="position: fixed; top: 0; left: 0; padding: 5px 5%; width: 90%;">
        <nav style="background-color: #007fff; padding: 5px 20px; border-radius: 50px; z-index: 999;">
            <a href="/index.html" style="color: white; text-decoration: none; font-weight: bold;">Back to Dashboard</a>
        </nav>
    </header>

    <div class="container">
        <h2>To Do List</h2>
        <div class="input-group">
            <input class="task-input" type="text" id="taskInput" placeholder="Add a new task...">
            <button class="add-btn" id="addTaskBtn">Add Task</button>
        </div>
        <div class="task-list">
            <div class="ongoing-tasks" id="ongoingTasks">
                <!-- 
                To hold tasks undner progress
                ul class= "tasks"
                li class= "task-item"
                complete button with a checkmark icon - class "complete-btn"
                delete button with a trash icon - class "delete-btn" 
                -->
            </div>
            <div class="task-history" id="taskHistory">
                <!-- To hold tasks that are completed or deleted -->
            </div>
        </div>
    </div>
</body>
<script src="script/main.js"></script>
</html>
