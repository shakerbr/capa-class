<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Conditions Traffic Light</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 95vh; flex-direction: column;">
    <header style="position: fixed; top: 0; left: 0; padding: 5px 5%; width: 90%;">
        <nav style="background-color: #007fff; padding: 5px 20px; border-radius: 50px; z-index: 999;">
            <a href="/index.html" style="color: white; text-decoration: none; font-weight: bold;">Back to Dashboard</a>
        </nav>
    </header>

    <h1>Traffic Light</h1>

    <div id="current-state-div">
        <div id="current-state-label">Current State</div>
        <div id="current-state-badge"></div>
    </div>

    <div class="container">
        <div class="traffic-light">
            <div class="light-state"></div>
            <button id="change-light">Change Traffic Light</button>
        </div>
        <div class="street">
            <div class="street-state"></div>
            <button id="change-street">Change Street State</button>
        </div>
    </div>
</body>
<script src="script/main.js"></script>
</html>
